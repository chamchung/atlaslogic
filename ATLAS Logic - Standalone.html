  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

items:center;gap:13px;text-decoration:none;}\n.logo-svg{width:88px;height:50px;display:block;border:none;background:transparent;--slot-border:transparent;}\n.logo-text{display:flex;flex-direction:column;line-height:1;}\n.logo-atlas{font-family:var(--fl);font-size:21px;font-weight:500;letter-spacing:.07em;color:var(--text);}\n.logo-logic{font-family:var(--fs);font-size:10.5px;font-weight:700;letter-spacing:.34em;color:var(--textS);margin-top:5px;padding-left:2px;text-transform:uppercase;}\n.nav-links{display:flex;gap:28px;list-style:none;}\n.nav-links a{color:var(--textS);text-decoration:none;font-size:13.5px;transition:color .15s;}\n.nav-links a:hover{color:var(--text);}\n.nav-right{display:flex;gap:10px;align-items:center;}\n.btn-ghost{background:transparent;border:1px solid var(--borderM);color:var(--textS);padding:8px 18px;border-radius:8px;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}\n.btn-ghost:hover{border-color:var(--violetB);color:var(--text);}\n.btn-violet{background:var(--violet);border:1px solid transparent;color:#fff;padding:8px 20px;border-radius:8px;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}\n.btn-violet:hover{background:var(--violetL);transform:translateY(-1px);}\n\n/* ── HERO ── */\n.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;}\n#canvas3d{position:absolute;inset:0;width:100%;height:100%;z-index:0;}\n.hero-fallback{position:absolute;right:8%;top:50%;transform:translateY(-50%);width:340px;max-width:42vw;z-index:0;display:none;animation:boatBob 5s ease-in-out infinite;}\n.hero-fallback svg{width:100%;height:auto;filter:drop-shadow(0 0 30px rgba(124,58,255,.35));}\nbody.no-webgl #canvas3d{display:none;}\nbody.no-webgl .hero-fallback{display:block;}\n@keyframes boatBob{0%,100%{transform:translateY(-50%) rotate(-2.5deg);}50%{transform:translateY(-58%) rotate(2.5deg);}}\n.hero-content{position:relative;z-index:10;max-width:600px;padding:120px 64px 80px;}\n.eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--cyanB);background:var(--cyanD);color:var(--cyan);padding:5px 14px;border-radius:100px;font-size:12px;font-weight:500;letter-spacing:.06em;margin-bottom:28px;}\n.dot-pulse{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 2s ease-in-out infinite;}\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}\n.hero h1{font-family:var(--fs);font-size:clamp(40px,5.5vw,66px);font-weight:800;line-height:1.05;letter-spacing:-.025em;margin-bottom:24px;}\n.h1-accent{color:var(--violetL);}\n.hero p{font-size:17px;font-weight:300;line-height:1.65;color:var(--textS);max-width:500px;margin-bottom:40px;}\n.hero-btns{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}\n.btn-hero{background:var(--violet);border:none;color:#fff;padding:14px 26px;border-radius:10px;font-family:var(--fb);font-size:15px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s;}\n.btn-hero:hover{background:var(--violetL);transform:translateY(-1px);}\n.btn-hero-ghost{background:transparent;border:1px solid var(--borderM);color:var(--text);padding:14px 26px;border-radius:10px;font-family:var(--fb);font-size:15px;font-weight:300;cursor:pointer;transition:all .15s;}\n.btn-hero-ghost:hover{border-color:var(--borderM);background:var(--ink3);}\n.scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--textM);font-size:11px;letter-spacing:.1em;animation:bounce 2s ease-in-out infinite;}\n@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}\n.scroll-hint svg{width:20px;height:20px;}\n\n/* stats strip */\n.stats-strip{background:var(--ink2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:40px 64px;}\n.stats-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:32px;}\n.stat-item .num{font-family:var(--fm);font-size:30px;font-weight:500;letter-spacing:-.02em;color:var(--text);}\n.stat-item .num span{font-size:16px;color:var(--violetL);}\n.stat-item .lbl{font-size:13px;color:var(--textS);margin-top:4px;}\n\n/* ── SECTION BASE ── */\nsection{padding:96px 64px;}\n.inner{max-width:1100px;margin:0 auto;}\n.s-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--violetL);margin-bottom:16px;}\n.s-title{font-family:var(--fs);font-size:clamp(28px,3.5vw,40px);font-weight:700;letter-spacing:-.02em;margin-bottom:14px;}\n.s-sub{font-size:16px;font-weight:300;color:var(--textS);max-width:480px;margin-bottom:56px;line-height:1.65;}\n\n/* ── PROBLEM CARDS ── */\n.problem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}\n.problem-card{background:var(--ink3);border:0.5px solid var(--border);border-left:2.5px solid var(--violet);border-radius:12px;padding:28px;transition:all .2s;}\n.problem-card:hover{border-color:var(--violetB);transform:translateY(-3px);}\n.pc-icon{width:40px;height:40px;border-radius:10px;background:var(--violetD);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}\n.pc-icon svg{width:20px;height:20px;stroke:var(--violetL);}\n.pc-title{font-family:var(--fs);font-size:17px;font-weight:700;margin-bottom:8px;}\n.pc-body{font-size:13.5px;color:var(--textS);line-height:1.6;}\n\n/* ── HOW IT WORKS ── */\n.how-step{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;margin-bottom:80px;}\n.how-step:last-child{margin-bottom:0;}\n.how-step.flip{direction:rtl;}\n.how-step.flip > *{direction:ltr;}\n.how-num{font-family:var(--fm);font-size:12px;color:var(--cyan);letter-spacing:.1em;margin-bottom:10px;}\n.how-title{font-family:var(--fs);font-size:28px;font-weight:700;letter-spacing:-.015em;margin-bottom:14px;}\n.how-body{font-size:15px;font-weight:300;color:var(--textS);line-height:1.7;margin-bottom:24px;}\n.how-tag{display:inline-block;padding:4px 12px;border-radius:5px;font-size:12px;font-weight:500;margin-right:8px;margin-bottom:8px;}\n.tag-v{background:var(--violetD);color:var(--violetL);border:1px solid var(--violetB);}\n.tag-c{background:var(--cyanD);color:var(--cyan);border:1px solid var(--cyanB);}\n.how-mock{background:var(--ink3);border:1px solid var(--borderM);border-radius:14px;padding:24px;font-size:13px;}\n.mock-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--textM);margin-bottom:14px;}\n.mock-bar-row{display:grid;grid-template-columns:130px 1fr auto;align-items:center;gap:12px;margin-bottom:12px;}\n.mock-bar-name{font-size:12px;color:var(--textS);}\n.mock-bar-bg{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}\n.mock-bar-fill{height:100%;border-radius:2px;}\n.mock-badge{font-family:var(--fm);font-size:10px;padding:2px 7px;border-radius:3px;}\n\n/* ── MASTERY ── */\n.mastery-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}\n.m-card{background:var(--ink3);border:0.5px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s;}\n.m-card:hover{border-color:var(--borderM);}\n.m-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}\n.m-name{font-size:14px;font-weight:500;}\n.m-badge{font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;letter-spacing:.04em;}\n.bd{background:var(--cyanD);color:var(--cyan);border:1px solid var(--cyanB);}\n.bg{background:rgba(255,184,28,.1);color:var(--gold);border:1px solid rgba(255,184,28,.3);}\n.bs{background:var(--ink2);color:var(--textS);border:1px solid var(--borderM);}\n.bb{background:var(--violetD);color:var(--violetL);border:1px solid var(--violetB);}\n.bl{opacity:.45;background:var(--ink2);color:var(--textM);border:1px solid var(--border);}\n.m-bar-bg{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin-bottom:8px;}\n.m-bar-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1);}\n.bfc{background:var(--cyan);}\n.bfg{background:var(--gold);}\n.bfv{background:var(--violet);}\n.bfd{background:var(--borderM);}\n.m-meta{font-family:var(--fm);font-size:11px;color:var(--textM);}\n\n/* ── PRICING ── */\n.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:start;}\n.price-card{background:var(--ink3);border:0.5px solid var(--border);border-radius:16px;padding:32px;position:relative;transition:transform .2s;}\n.price-card:hover{transform:translateY(-4px);}\n.price-card.featured{border:1.5px solid var(--violetB);background:linear-gradient(160deg,rgba(124,58,255,.08) 0%,var(--ink3) 60%);}\n.featured-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--violet);color:#fff;font-size:11px;font-weight:600;padding:4px 16px;border-radius:100px;white-space:nowrap;letter-spacing:.04em;}\n.price-tier{font-family:var(--fs);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--textS);margin-bottom:12px;}\n.price-amount{font-family:var(--fm);font-size:40px;font-weight:500;letter-spacing:-.03em;margin-bottom:4px;}\n.price-amount sup{font-size:20px;vertical-align:top;margin-top:8px;color:var(--textS);}\n.price-period{font-size:12px;color:var(--textS);margin-bottom:24px;}\n.price-divider{height:0.5px;background:var(--border);margin-bottom:24px;}\n.price-features{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}\n.price-features li{font-size:13.5px;color:var(--textS);display:flex;align-items:flex-start;gap:8px;}\n.price-features li::before{content:'→';color:var(--violetL);flex-shrink:0;font-size:13px;}\n.price-features li.dim{opacity:.5;}\n.price-features li.dim::before{color:var(--textM);}\n.price-cta{width:100%;padding:12px;border-radius:8px;font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);backgro ght:700;letter-spacing:.32em;color:var(--textS);margin-top:4px;text-transform:uppercase;}\n.footer-desc{font-size:13px;color:var(--textS);line-height:1.6;margin-top:12px;max-width:200px;}\n.footer-col h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--textM);margin-bottom:14px;}\n.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:10px;}\n.footer-col ul a{color:var(--textS);text-decoration:none;font-size:13px;transition:color .15s;}\n.footer-col ul a:hover{color:var(--text);}\n.footer-bottom{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:24px;font-size:12px;color:var(--textM);}\n\n/* ── SCROLL REVEAL ── */\n.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease, transform .7s ease;}\n.reveal.visible{opacity:1;transform:none;}\n\n/* ── RESPONSIVE ── */\n@media(max-width:900px){\n  nav{padding:0 20px;}\n  .nav-links{display:none;}\n  .hero-content{padding:100px 24px 60px;}\n  .stats-inner,.problem-grid,.how-step,.mastery-grid,.pricing-grid,.testimonial-grid{grid-template-columns:1fr;}\n  .how-step.flip{direction:ltr;}\n  section{padding:64px 24px;}\n  .stats-strip{padding:32px 24px;}\n  footer{padding:40px 24px 24px;}\n  .footer-top{grid-template-columns:1fr 1fr;}\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- NAV -->\n<nav>\n  <a class=\"logo\" href=\"#\">\n    <image-slot class=\"logo-svg\" id=\"atlas-logo\" src=\"6fa5a6cd-c4b1-4f58-88f1-0a935aba4eae\" fit=\"contain\" placeholder=\"logo\"><\u002Fimage-slot>\n    <div class=\"logo-text\">\n      <span class=\"logo-atlas\">ATLAS<\u002Fspan>\n      <span class=\"logo-logic\">LOGIC<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a href=\"#problem\">Curriculum<\u002Fa><\u002Fli>\n    <li><a href=\"#\">Tutoring<\u002Fa><\u002Fli>\n    <li><a href=\"#pricing\">Pricing<\u002Fa><\u002Fli>\n    <li><a href=\"#\">About<\u002Fa     scroll\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- STATS -->\n<div class=\"stats-strip\">\n  <div class=\"stats-inner\">\n    <div class=\"stat-item\"><div class=\"num\">+11<span>pt<\u002Fspan><\u002Fdiv><div class=\"lbl\">avg. score improvement<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-item\"><div class=\"num\">94<span>%<\u002Fspan><\u002Fdiv><div class=\"lbl\">students hit target score<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-item\"><div class=\"num\">4.8<span>/5<\u002Fspan><\u002Fdiv><div class=\"lbl\">tutor satisfaction rating<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-item\"><div class=\"num\">48<span>hr<\u002Fspan><\u002Fdiv><div class=\"lbl\">avg. hours to first mastery<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PROBLEM -->\n<section id=\"problem\" style=\"background:var(--ink2);\">\n  <div class=\"inner\">\n    <div class=\"s-label reveal\">Why students fail<\u002Fdiv>\n    <h2 class=\"s-title reveal\">Most LSAT prep is broken by design.<\u002Fh2>\n    <p class=\"s-sub reveal\">The platforms that exist were built around content delivery. Atlas is built around learning.<\u002Fp>\n    <div class=\"problem-grid\">\n      <div class=\"problem-card reveal\">\n        <div class=\"pc-icon\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke-width=\"1.5\" stroke-linecap=\"round\"><path d=\"M10 2v8M6 10l4 4 4-4M4 18h12\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"pc-title\">Passive studying<\u002Fdiv>\n        <div class=\"pc-body\">Watching videos and re-reading notes feels productive. It isn't. Real learning requires active retrieval and structured reflection — not consumption.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"problem-card reveal\">\n        <div class=\"pc-icon\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke-width=\"1.5\" stroke-linecap=\"round\"><path d=\"M3 5h14M3 10h8M3 15h5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"pc-title\">No structure<\u002Fdiv>\n        <div class=\"pc-body\">Random drilling is the enemy of improvement. Without a coherent curriculum sequence, students repeat mistakes and never build the underlying logic skills.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"problem-card reveal\">\n        <div class=\"pc-icon\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke-width=\"1.5\" stroke-linecap=\"round\"><circle cx=\"10\" cy=\"10\" r=\"7\"><\u002Fcircle><path d=\"M10 6v4l3 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"pc-title\">No accountability<\u002Fdiv>\n        <div class=\"pc-body\">Between tutoring sessions, most students drift. Atlas tracks every missed question, every pattern, every week — and your tutor sees all of it.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section>\n  <div class=\"inner\">\n    <div class=\"s-label reveal\">How it works<\u002Fdiv>\n    <h2 class=\"s-title reveal\">Three stages. One system.<\u002Fh2>\n    <p class=\"s-sub reveal\">From your baseline diagnostic to your test day warmup — Atlas manages the entire arc.<\u002Fp>\n\n    <div class=\"how-step reveal\">\n      <div>\n        <div class=\"how-num\">01 — DIAGNOSTIC &amp; PLANNING<\u002Fdiv>\n        <h3 class=\"how-title\">Know where you start. Know where you're going.<\u002Fh3>\n        <p class=\"how-body\">Import your LawHub scores or take a fresh diagnostic. Atlas analyzes your question-type accuracy, timing, and confidence calibration — then generates a week-by-week plan to your target score.<\u002Fp>\n        <span class=\"how-tag tag-c\">LawHub integration<\u002Fspan>\n        <span class=\"how-tag tag-v\">Adaptive calendar<\u002Fspan>\n        <span class=\"how-tag tag-c\">Goal tracking<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"how-mock\">\n        <div class=\"mock-label\">Diagnostic results — Jordan M.<\u002Fdiv>\n        <div class=\"mock-bar-row\"><div class=\"mock-bar-name\">Must Be True<\u002Fdiv><div class=\"mock-bar-bg\"><div class=\"mock-bar-fill bfc\" style=\"width:94%\"><\u002Fdiv><\u002Fdiv><span class=\"mock-badge bd\">94%<\u002Fspan><\u002Fdiv>\n        <div class=\"mock-bar-row\"><div class=\"mock-bar-name\">Strengthen<\u002Fdiv><div class=\"mock-bar-bg\"><div class=\"mock-bar-fill bfg\" style=\"width:82%\"><\u002Fdiv><\u002Fdiv><span class=\"mock-badge bg\">82%<\u002Fspan><\u002Fdiv>\n        <div class=\"mock-bar-row\"><div class=\"mock-bar-name\">Sufficient Assumption<\u002Fdiv><div class=\"mock-bar-bg\"><div class=\"mock-bar-fill bfv\" style=\"width:42%\"><\u002Fdiv><\u002Fdiv><span class=\"mock-badge bb\" style=\"font-size:10px;\">42%<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:14px;padding:10px;background:rgba(0,212,255,.06);border:1px solid var(--cyanB);border-radius:7px;font-size:12px;color:var(--cyan);\">Plan generated: 12 weeks · Test date Aug 7 · 47 days remaining<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"how-step flip reveal\">\n      <div>\n        <div class=\"how-num\">02 — STRUCTURED DRILLING<\u002Fdiv>\n        <h3 class=\"how-title\">Every drill has a reason. Every miss has a lesson.<\u002Fh3>\n        <p class=\"how-body\">Each question type gets its own curriculum: concept video, guided walkthrough, untimed drill, timed drill, blind review. The error log captures not just what you missed — but why, and what the pattern is.<\u002Fp>\n        <span class=\"how-tag tag-v\">Error log<\u002Fspan>\n        <span class=\"how-tag tag-v\">Pattern detection<\u002Fspan>\n        <span class=\"how-tag tag-c\">Blind review<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"how-mock\">\n        <div class=\"mock-label\">Error log entry<\u002Fdiv>\n        <div style=\"border-left:2.5px solid var(--gold);padding:10px 14px;background:rgba(255,184,28,.05);border-radius:4px;font-size:12.5px;line-height:1.5;\">\n          <div style=\"color:var(--gold);font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;\">Sufficient Assumption · PT78 S2 Q14<\u002Fdiv>\n          <div style=\"color:var(--textS);margin-bottom:6px;\"><strong style=\"color:var(--text);\">Why I chose (D):<\u002Fstrong> The contrapositive felt like it supported the conclusion.<\u002Fdiv>\n          <div style=\"color:var(--textS);\"><strong style=\"color:var(--text);\">Why (B) is right:<\u002Fstrong> Only (B) guarantees the conclusion — (D) merely makes it more likely.<\u002Fdiv>\n          <div style=\"margin-top:8px;\"><span style=\"background:rgba(255,184,28,.1);color:var(--gold);font-size:10px;padding:2px 8px;border-radius:4px;\">scope shift<\u002Fspan> <span style=\"background:rgba(255,184,28,.1);color:var(--gold);font-size:10px;padding:2px 8px;border-radius:4px;\">causal confusion<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"how-step reveal\">\n      <div>\n        <div class=\"how-num\">03 — COACHING &amp; REVIEW<\u002Fdiv>\n        <h3 class=\"how-title\">Your tutor sees everything. Every session is prepared.<\u002Fh3>\n        <p class=\"how-body\">Before every session, your tutor receives an auto-generated brief: your top three error patterns, homework status, and calibration flags. No time is wasted. Every minute is on the thing that matters most.<\u002Fp>\n        <span class=\"how-tag tag-c\">Session prep brief<\u002Fspan>\n        <span class=\"how-tag tag-v\">Homework assignment<\u002Fspan>\n        <span class=\"how-tag tag-c\">Test-week protocol<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"how-mock\">\n        <div class=\"mock-label\">Pre-session brief — Maya R. → Jordan M.<\u002Fdiv>\n        <div style=\"font-size:12px;display:flex;flex-direction:column;gap:8px;\">\n          <div style=\"padding:8px 12px;background:var(--violetD);border:1px solid var(--violetB);border-radius:7px;color:var(--violetL);\">Top pattern: Sufficient Assumption overconfidence (8/12 missed as \"certain\")<\u002Fdiv>\n          <div style=\"padding:8px 12px;background:var(--cyanD);border:1px solid var(--cyanB);border-radius:7px;color:var(--cyan);\">Homework: ✓ Completed · Error log: 12 new entries<\u002Fdiv>\n          <div style=\"padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;color:var(--textS);\">Suggested focus: Negation test + scope shift drill<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MASTERY -->\n<section style=\"background:var(--ink2);\">\n  <div class=\"inner\">\n    <div class=\"s-label reveal\">Mastery tracking<\u002Fdiv>\n    <h2 class=\"s-title reveal\">Know exactly where you stand — always.<\u002Fh2>\n    <p class=\"s-sub reveal\">Mastery updates in real time based on accuracy and confidence calibration. Not question count. Not time spent. Actual understanding.<\u002Fp>\n    <div class=\"mastery-grid\">\n      <div class=\"m-card reveal\"><div class=\"m-top\"><div class=\"m-name\">Must Be True<\u002Fdiv><div class=\"m-badge bd\">DIAMOND<\u002Fdiv><\u002Fdiv><div class=\"m-bar-bg\"><div class=\"m-bar-fill bfc\" data-width=\"96\"><\u002Fdiv><\u002Fdiv><div class=\"m-meta\">96% accuracy · 42 questions<\u002Fdiv><\u002Fdiv>\n      <div class=\"m-card reveal\"><div class=\"m-top\"><div class=\"m-name\">Strengthen<\u002Fdiv><div class=\"m-badge bg\">GOLD<\u002Fdiv><\u002Fdiv><div class=\"m-bar-bg\"><div class=\"m-bar-fill bfg\" data-width=\"82\"><\u002Fdiv><\u002Fdiv><div class=\"m-meta\">82% accuracy · 38 questions<\u002Fdiv><\u002Fdiv>\n      <div class=\"m-card reveal\"><div class=\"m-top\"><div class=\"m-name\">Necessary Assumption<\u002Fdiv><div class=\"m-badge bs\">SILVER<\u002Fdiv><\u002Fdiv><div class=\"m-bar-bg\"><div class=\"m-bar-fill bfv\" data-width=\"64\"><\u002Fdiv><\u002Fdiv><div class=\"m-meta\">64% accuracy · 29 questions<\u002Fdiv><\u002Fdiv>\n      <div class=\"m-card reveal\"><div class=\"m-top\"><div class=\"m-name\">Sufficient Assumption<\u002Fdiv><div class=\"m-badge bb\">BRONZE<\u002Fdiv><\u00 ══════════════════════════════════════════ */\n(function() {\n  const canvas = document.getElementById('canvas3d');\n  const hero   = canvas.parentElement;\n\n  // WebGL fallback -> CSS class on body\n  let gl;\n  try { gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl'); } catch(err) {}\n  if (!gl) { document.body.classList.add('no-webgl'); return; }\n\n  const scene  = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 220);\n  camera.position.set(0, 1.8, 7);\n  camera.lookAt(0, 0, 0);\n\n  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n  renderer.setClearColor(0x000000, 0);\n\n  function resize() {\n    const w = hero.offsetWidth, h = hero.offsetHeight;\n    renderer.setSize(w, h);\n    camera.aspect = w / h;\n    camera.updateProjectionMatrix();\n  }\n  resize();\n  window.addEventListener('resize', resize);\n\n  // ── LIGHTS (moonlit night) ──\n  const ambient = new THREE.AmbientLight(0x222244, 0.72);\n  scene.add(ambient);\n  const moonLight = new THREE.DirectionalLight(0xbcd0ff, 1.15);\n  moonLight.position.set(-6, 7, 3);\n  scene.add(moonLight);\n  const violetLight = new THREE.PointLight(0x7C3AFF, 0.85, 14);\n  violetLight.position.set(1.4, 0.6, 2.5);\n  scene.add(violetLight);\n  const cyanLight = new THREE.DirectionalLight(0x00D4FF, 0.16);\n  cyanLight.position.set(3, 2, 4);\n  scene.add(cyanLight);\n\n  // ── soft round textures ──\n  function radialTex(stops) {\n    const c = document.createElement('canvas'); c.width = c.height = 64;\n    const g = c.getContext('2d');\n    const grd = g.createRadialGradient(32,32,0,32,32,32);\n    stops.forEach(s => grd.addColorStop(s[0], s[1]));\n    g.fillStyle = grd; g.fillRect(0,0,64,64);\n    return new THREE.CanvasTexture(c);\n  }\n  const starTex = radialTex([[0,'rgba(255,255,255,1)'],[0.25,'rgba(255,255,255,0.85)'],[0.55,'rgba(200,212,255,0.3)'],[1,'rgba(255,255,255,0)']]);\n  const glowWhite = radialTex([[0,'rgba(255,255,255,0.9)'],[0.3,'rgba(230,238,255,0.35)'],[1,'rgba(255,255,255,0)']]);\n  const glowMoon  = radialTex([[0,'rgba(196,210,255,0.55)'],[0.28,'rgba(170,190,255,0.22)'],[1,'rgba(160,180,255,0)']]);\n\n  // ── STARFIELD (two depth layers) ──\n  function makeStars(count, spreadX, spreadY, yMin, zBase, size, opacity) {\n    const geo = new THREE.BufferGeometry();\n    const pos = new Float32Array(count*3);\n    for (let i=0;i<count*3;i+=3){\n      pos[i]   = (Math.random()-0.5)*spreadX;\n      pos[i+1] = yMin + Math.random()*spreadY;\n      pos[i+2] = zBase - Math.random()*30;\n    }\n    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));\n    const mat = new THREE.PointsMaterial({ map:starTex, size, transparent:true, opacity, depthWrite:false, blending:THREE.AdditiveBlending, color:0xffffff, sizeAttenuation:true });\n    return new THREE.Points(geo, mat);\n  }\n  const stars1 = makeStars(460, 90, 26, 2.5, -16, 0.5, 0.9);\n  const stars2 = makeStars(240, 70, 22, 5,   -10, 0.9, 0.7);\n  scene.add(stars1); scene.add(stars2);\n\n  // ── MOON ──\n  const moonGroup = new THREE.Group();\n  moonGroup.position.set(-10.5, 6.6, -26);\n  scene.add(moonGroup);\n  const moon = new THREE.Mesh(\n    new THREE.SphereGeometry(1.55, 48, 48),\n    new THREE.MeshStandardMaterial({ color:0xf2f2ff, emissive:0xc6d0f4, emissiveIntensity:1.12, roughness:1, metalness:0 })\n  );\n  moonGroup.add(moon);\n  const moonGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map:glowMoon, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.9 }));\n  moonGlow.scale.set(13,13,1);\n  moonGroup.add(moonGlow);\n\n  // ── CONSTELLATION (custom, upper-right) ──\n  const cPts = [[3.4,9.2],[4.9,10.6],[6.5,9.7],[7.5,11.1],[8.9,10.3],[6.6,8.0],[8.3,7.3]]\n    .map(p => new THREE.Vector3(p[0], p[1], -19));\n  const cLinks = [[0,1],[1,2],[2,3],[3,4],[2,5],[5,6]];\n  scene.add(new THREE.Points(\n    new THREE.BufferGeometry().setFromPoints(cPts),\n    new THREE.PointsMaterial({ map:starTex, size:1.25, transparent:true, opacity:1, depthWrite:false, blending:THREE.AdditiveBlending, color:0xe3e9ff })\n  ));\n  const clp = [];\n  cLinks.forEach(l => { clp.push(cPts[l[0]], cPts[l[1]]); });\n  const constLine = new THREE.LineSegments(\n    new THREE.BufferGeometry().setFromPoints(clp),\n    new THREE.LineBasicMaterial({ color:0x93a4dc, transparent:true, opacity:0.3 })\n  );\n  scene.add(constLine);\n\n  // ── OCEAN ──\n  const OCEAN_W = 46, OCEAN_H = 46, SEG = 150;\n  const oceanGeo = new THREE.PlaneGeometry(OCEAN_W, OCEAN_H, SEG, SEG);\n  oceanGeo.rotateX(-Math.PI / 2);\n  const oceanMat = new THREE.MeshPhongMaterial({\n    color: 0x070f24, specular: 0x6f86e6, shininess: 165, emissive: 0x03061a,\n    transparent: true, opacity: 0.97, side: THREE.DoubleSide\n  });\n  const ocean = new THREE.Mesh(oceanGeo, oceanMat);\n  ocean.position.y = -0.92;\n  scene.add(ocean);\n\n  // crest highlight lines (cyan) — a second wireframe-ish layer that follows crests\n  const crestMat = new THREE.MeshPhongMaterial({ color:0x0c2a4a, emissive:0x00557a, emissiveIntensity:0.0, transparent:true, opacity:0.0, side:THREE.DoubleSide });\n\n  // ── MOON REFLECTION (moonglade) ──\n  // Broken, shimmering column of light that widens toward the viewer and\n  // concentrates into a bright disc near the moon end.\n  function reflectionCanvas(){\n    const W=64, H=256;\n    const c = document.createElement('canvas'); c.width = W; c.height = H;\n    const g = c.getContext('2d');\n    for (let y=0;y<H;y++){\n      const yn = y/H;                              // 0 = far (moon), 1 = near (viewer)\n      const fade = Math.sin(yn*Math.PI);           // dim at both ends\n      const disc = Math.exp(-Math.pow((yn-0.10)/0.12,2)); // bright moon-disc near far end\n      // horizontal ripple breakup that shifts with depth\n      const band = 0.30 + 0.70*Math.pow(Math.abs(Math.sin(y*0.42 + Math.sin(y*0.11)*1.6)), 1.3);\n      const widthN = 0.35 + 0.65*yn;               // glade widens toward viewer\n      for (let x=0;x<W;x++){\n        const xc = (x/W - 0.5)/ (widthN*0.5);      // -1..1 across current width\n        if (Math.abs(xc) > 1) { g.clearRect(x,y,1,1); continue; }\n        const xf = Math.pow(Math.cos(xc*Math.PI*0.5), 1.6);\n        const a = Math.min(1, fade*band*xf*0.85 + disc*xf*0.9);\n        g.fillStyle = 'rgba(206,218,255,'+a.toFixed(3)+')';\n        g.fillRect(x,y,1,1);\n      }\n    }\n    return c;\n  }\n  const reflTex = new THREE.CanvasTexture(reflectionCanvas());\n  reflTex.wrapS = reflTex.wrapT = THREE.RepeatWrapping;\n  const reflGeo = new THREE.PlaneGeometry(5.0, 15, 1, 1);\n  reflGeo.rotateX(-Math.PI/2);\n  const reflMat = new THREE.MeshBasicMaterial({ map:reflTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.85 });\n  const reflection = new THREE.Mesh(reflGeo, reflMat);\n  reflection.position.set(-4.6, -0.78, -0.5);\n  reflection.rotation.y = 0.16;\n  scene.add(reflection);\n\n  // ── GALAXY GLOW REFLECTION (under the boat / bright sky) ──\n  function galaxyReflCanvas(){\n    const W=64, H=256; const c=document.createElement('canvas'); c.width=W;c.height=H;\n    const g=c.getContext('2d');\n    for (let y=0;y<H;y++){\n      const yn=y/H, fade=Math.sin(yn*Math.PI);\n      const band=0.4+0.6*Math.abs(Math.sin(y*0.5+Math.sin(y*0.2)));\n      for (let x=0;x<W;x++){\n        const xf=Math.pow(Math.sin((x/W)*Math.PI),1.5);\n        const a=fade*band*xf*0.5;\n        g.fillStyle='rgba(150,170,255,'+a.toFixed(3)+')';\n        g.fillRect(x,y,1,1);\n      }\n    }\n    return c;\n  }\n  const galReflTex = new THREE.CanvasTexture(galaxyReflCanvas());\n  galReflTex.wrapS = galReflTex.wrapT = THREE.RepeatWrapping;\n  const galReflGeo = new THREE.PlaneGeometry(2.4, 11, 1, 1);\n  galReflGeo.rotateX(-Math.PI/2);\n  const galReflMat = new THREE.MeshBasicMaterial({ map:galReflTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.4 });\n  const galReflection = new THREE.Mesh(galReflGeo, galReflMat);\n  galReflection.position.set(1.3, -0.74, -1.6);\n  scene.add(galReflection);\n\n  // bright reflected-moon glow sitting on the waterline under the moon\n  const moonReflGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map:glowMoon, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.85 }));\n  moonReflGlow.scale.set(4.2, 2.2, 1);\n  moonReflGlow.position.set(-4.7, -0.86, 1.2);\n  scene.add(moonReflGlow);\n\n  // ── SHOOTING STAR ──\n  const ssGeo = new THREE.BufferGeometry();\n  ssGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));\n  const ssMat = new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0, blending:THREE.AdditiveBlending });\n  const shootingStar = new THREE.Line(ssGeo, ssMat);\n  scene.add(shootingStar);\n  const ssHead = new THREE.Sprite(new THREE.SpriteMaterial({ map:glowWhite, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0 }));\n  ssHead.scale.set(1.1,1.1,1);\n  scene.add(ssHead);\n  let ssActive=false, ssT=0, ssNext=2.5+Math.random()*3;\n  const ssStart=new THREE.Vector3(), ssDir=new THREE.Vector3();\n  function triggerSS(){\n    ssActive=true; ssT=0;\n    ssStart.set(5+Math.random()*7, 8.5+Math.random()*3.5, -17-Math.random()*7);\n    ssDir.set(-1.7-Math.random()*0.5, -0.7-Math.random()*0.35, 0).normalize();\n  }\n\n  // ── SAILBOAT ──\n  const boat = new THREE.Group();\n  scene.add(boat);\n  function boatTargetX() { return hero.offsetWidth < 900 ? 0 : 1.5; }\n  boat.position.x = boatTargetX();\n  boat.scale.setScalar(0.6);\n\n  const hullMat = new THREE.MeshPhongMaterial({ color:0x0f0f24, specular:0x5566bb, shininess:80 });\n  const deckMat = new THREE.MeshPhongMaterial({ color:0x191934, specular:0x6677cc, shininess:60 });\n  const sparMat = new THREE.MeshPhongMaterial({ color:0xC6C6DC, shininess:70 });\n\n  // Hull — extruded side profile, raked bow at +x\n  const hullShape = new THREE.Shape();\n  hullShape.moveTo(-1.28, 0.16);\n  hullShape.lineTo(1.42, 0.10);\n  hullShape.quadraticCurveTo(1.66, -0.02, 1.40, -0.20);\n  hullShape.quadraticCurveTo(0.45, -0.54, -0.45, -0.52);\n  hullShape.quadraticCurveTo(-1.16, -0.50, -1.32, -0.18);\n  hullShape.lineTo(-1.28, 0.16);\n  const hullGeo = new THREE.ExtrudeGeometry(hullShape, { depth:0.62, bevelEnabled:true, bevelSize:0.06, bevelThickness:0.05, bevelSegments:3 });\n  hullGeo.translate(0, 0, -0.31);\n  const hull = new THREE.Mesh(hullGeo, hullMat);\n  hull.position.y = -0.60;\n  boat.add(hull);\n\n  // Deck cap (pointed top-view plane)\n  const deckShape = new THREE.Shape();\n  deckShape.moveTo(-1.24, 0.30);\n  deckShape.quadraticCurveTo(1.05, 0.30, 1.5, 0);\n  deckShape.quadraticCurveTo(1.05, -0.30, -1.24, -0.30);\n  deckShape.quadraticCurveTo(-1.40, 0, -1.24, 0.30);\n  const deckGeo = new THREE.ShapeGeometry(deckShape);\n  deckGeo.rotateX(-Math.PI/2);\n  const deck = new THREE.Mesh(deckGeo, deckMat);\n  deck.position.y = -0.30;\n  boat.add(deck);\n\n  // small cabin\n  const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.2, 0.42), deckMat);\n  cabin.position.set(-0.35, -0.18, 0);\n  boat.add(cabin);\n\n  // rig group\n  const rig = new THREE.Group();\n  rig.position.y = -0.28;\n  boat.add(rig);\n\n  // Mast + boom\n  const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.024, 0.034, 3.5, 10), sparMat);\n  mast.position.set(-0.05, 1.5, 0);\n  rig.add(mast);\n  const boom = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.55, 8), sparMat);\n  boom.rotation.z = Math.PI/2;\n  boom.position.set(-0.55, 0.16, 0);\n  rig.add(boom);\n\n  // Billowing sail builder (grid mesh, tapers to apex, bows in z)\n  function makeSail(height, baseW, lean, billow, color, opacity) {\n    const ROWS=16, COLS=12;\n    const verts=[], idx=[];\n    for (let r=0;r<=ROWS;r++){\n      const v=r/ROWS, y=v*height, w=baseW*(1-v), lx=lean*v;\n      for (let c=0;c<=COLS;c++){\n        const u=c/COLS;\n        const x = lx - u*w;                 // chord extends toward -x (aft)\n        const z = Math.sin(u*Math.PI) * billow * (1 - v*0.55);\n        verts.push(x, y, z);\n      }\n    }\n    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){\n      const a=r*(COLS+1)+c, b=a+1, d=a+(COLS+1), e2=d+1;\n      idx.push(a,d,b, b,d,e2);\n    }\n    const geo = new THREE.BufferGeometry();\n    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));\n    geo.setIndex(idx); geo.computeVertexNormals();\n    const mat = new THREE.MeshPhongMaterial({ color, specular:0x6677cc, shininess:16, transparent:true, opacity, side:THREE.DoubleSide, emissive:0x10101f, emissiveIntensity:0.3 });\n    return new THREE.Mesh(geo, mat);\n  }\n\n  // Main sail (aft of mast)\n  const mainSail = makeSail(2.8, 0.96, 0.40, 0.08, 0xEFEFFF, 0.96);\n  mainSail.position.set(0.0, 0.12, 0);\n  rig.add(mainSail);\n\n  // Jib (smaller, in front of mast toward bow) — same lean as main\n  const jib = makeSail(1.85, 0.54, 0.30, 0.05, 0xE2E6FF, 0.92);\n  jib.position.set(0.46, 0.12, 0.02);\n  rig.add(jib);\n\n  // ── SAIL BATTENS (horizontal seam lines on the main sail) ──\n  function battenLine(v){\n    const height=2.8, baseW=0.96, lean=0.40, billow=0.08, COLS=14;\n    const pts=[];\n    const y=v*height, w=baseW*(1-v), lx=lean*v;\n    for (let c=0;c<=COLS;c++){\n      const u=c/COLS;\n      const x = lx - u*w;\n      const z = Math.sin(u*Math.PI)*billow*(1 - v*0.55);\n      pts.push(new THREE.Vector3(x, y, z+0.004));\n    }\n    return pts;\n  }\n  const battenMat = new THREE.LineBasicMaterial({ color:0xb9bfe0, transparent:true, opacity:0.32 });\n  [0.22,0.44,0.66].forEach(v => {\n    const bl = new THREE.Line(new THREE.BufferGeometry().setFromPoints(battenLine(v)), battenMat);\n    mainSail.add(bl);\n  });\n\n  // ── STANDING RIGGING (forestay, backstay, shrouds) ──\n  const mastTop = new THREE.Vector3(-0.05, 3.2, 0);\n  const rigPts = [\n    mastTop, new THREE.Vector3( 1.45, -0.02,  0),    // forestay → bow\n    mastTop, new THREE.Vector3(-1.25, -0.02,  0),    // backstay → stern\n    mastTop, new THREE.Vector3(-0.05, -0.02,  0.30), // shroud (starboard)\n    mastTop, new THREE.Vector3(-0.05, -0.02, -0.30), // shroud (port)\n  ];\n  const rigging = new THREE.LineSegments(\n    new THREE.BufferGeometry().setFromPoints(rigPts),\n    new THREE.LineBasicMaterial({ color:0xC6C6DC, transparent:true, opacity:0.42 })\n  );\n  rig.add(rigging);\n\n  // ── MASTHEAD BURGEE (small pennant) ──\n  const burgeeShape = new THREE.Shape();\n  burgeeShape.moveTo(0, 0);\n  burgeeShape.lineTo(0.42, 0.05);\n  burgeeShape.lineTo(0, 0.16);\n  burgeeShape.lineTo(0, 0);\n  const burgee = new THREE.Mesh(\n    new THREE.ShapeGeometry(burgeeShape),\n    new THREE.MeshBasicMaterial({ color:0x9D6FFF, transparent:true, opacity:0.9, side:THREE.DoubleSide })\n  );\n  burgee.position.set(-0.05, 3.16, 0);\n  rig.add(burgee);\n\n  // ── RUDDER (thin fin below the stern) ──\n  const rudderShape = new THREE.Shape();\n  rudderShape.moveTo(0, 0);\n  rudderShape.lineTo(0.04, 0);\n  rudderShape.lineTo(0.20, -0.42);\n  rudderShape.lineTo(0.12, -0.46);\n  rudderShape.lineTo(0, 0);\n  const rudderGeo = new THREE.ExtrudeGeometry(rudderShape, { depth:0.05, bevelEnabled:false });\n  rudderGeo.translate(0,0,-0.025);\n  const rudder = new THREE.Mesh(rudderGeo, hullMat);\n  rudder.position.set(-1.22, -0.66, 0);\n  boat.add(rudder);\n\n  // ── BOW PULPIT RAIL (subtle deck detail) ──\n  const railPts = [\n    new THREE.Vector3(1.42, 0.06, 0.0), new THREE.Vector3(1.18, 0.22, 0.12),\n    new THREE.Vector3(1.42, 0.06, 0.0), new THREE.Vector3(1.18, 0.22, -0.12),\n  ];\n  const rail = new THREE.LineSegments(\n    new THREE.BufferGeometry().setFromPoints(railPts),\n    new THREE.LineBasicMaterial({ color:0xC6C6DC, transparent:true, opacity:0.35 })\n  );\n  boat.add(rail);\n\n  // ── INTERACTION ──\n  let targetRotY=0, targetRotX=0, currentRotY=0, currentRotX=0;\n  window.addEventListener('mousemove', e => {\n    const mx=(e.clientX/window.innerWidth -0.5)*2;\n    const my=(e.clientY/window.innerHeight-0.5)*2;\n    targetRotY =  mx*0.26;\n    targetRotX = -my*0.06;\n  });\n  let scrollY=0;\n  window.addEventListener('scroll', () => { scrollY=window.scrollY; });\n\n  // ── ANIMATE ──\n  const clock = new THREE.Clock();\n  const pos = oceanGeo.attributes.position;\n  function animate() {\n    requestAnimationFrame(animate);\n    const t = clock.getElapsedTime();\n\n    // layered ocean swell — broad rollers + fine chop for detailed waves\n    for (let i=0;i<pos.count;i++){\n      const x=pos.getX(i), z=pos.getZ(i);\n      const w = Math.sin(x*0.40 + t*0.8)*0.30\n              + Math.sin(z*0.50 + t*0.6)*0.22\n              + Math.sin((x+z)*0.30 + t*1.0)*0.14\n              + Math.sin(x*0.95 - z*0.35 + t*1.3)*0.075\n              + Math.sin(x*1.75 + z*0.55 + t*1.9)*0.05\n              + Math.sin(z*2.15 - x*0.45 + t*2.3)*0.034\n              + Math.sin((x*0.7 - z*1.4) + t*2.8)*0.022;\n      pos.setY(i, w);\n    }\n    pos.needsUpdate = true;\n    oceanGeo.computeVertexNormals();\n\n    // moonglade shimmer\n    reflTex.offset.y = t*0.05;\n    reflection.material.opacity = 0.74 + Math.sin(t*1.2)*0.14;\n    galReflTex.offset.y = t*0.07;\n    galReflection.material.opacity = 0.34 + Math.sin(t*0.9+2)*0.10;\n    moonReflGlow.material.opacity = 0.74 + Math.sin(t*1.4)*0.16;\n    moonReflGlow.position.x = -4.7 + Math.sin(t*0.9)*0.15;\n\n    // boat rocking on open sea\n    boat.position.x += (boatTargetX() - boat.position.x)*0.05;\n    boat.position.y = Math.sin(t*0.7)*0.12 + Math.sin(t*1.15)*0.05;\n    boat.rotation.z = Math.sin(t*0.55)*0.075 + Math.sin(t*0.93)*0.025;\n    boat.rotation.x = Math.sin(t*0.46)*0.05 + Math.sin(t*0.81)*0.02;\n\n    // twinkle\n    stars1.material.opacity = 0.78 + Math.sin(t*1.5)*0.12;\n    stars2.material.opacity = 0.62 + Math.sin(t*1.1+1)*0.12;\n    constLine.material.opacity = 0.26 + Math.sin(t*0.7)*0.06;\n    moonGlow.material.opacity = 0.88 + Math.sin(t*0.8)*0.08;\n\n    // shooting star\n    ssNext -= 0.016;\n    if (!ssActive && ssNext<=0){ triggerSS(); ssNext = 6+Math.random()*6; }\n    if (ssActive){\n      ssT += 0.016;\n      const speed=24, trail=3.4;\n      const head = ssStart.clone().add(ssDir.clone().multiplyScalar(speed*ssT));\n      const tail = head.clone().add(ssDir.clone().multiplyScalar(-trail));\n      const arr = ssGeo.attributes.position.array;\n      arr[0]=tail.x; arr[1]=tail.y; arr[2]=tail.z;\n      arr[3]=head.x; arr[4]=head.y; arr[5]=head.z;\n      ssGeo.attributes.position.needsUpdate = true;\n      const life = ssT/0.85;\n      const op = life<1 ? Math.sin(life*Math.PI) : 0;\n      ssMat.opacity = op*0.9;\n      ssHead.position.copy(head);\n      ssHead.material.opacity = op;\n      if (ssT>0.85){ ssActive=false; ssMat.opacity=0; ssHead.material.opacity=0; }\n    }\n\n    // parallax + scroll\n    currentRotY += (targetRotY-currentRotY)*0.04;\n    currentRotX += (targetRotX-currentRotX)*0.04;\n    camera.position.x = Math.sin(currentRotY)*2.5;\n    camera.position.z = 8.0 + Math.sin(currentRotY)*0.8;\n    camera.position.y = 1.55 + currentRotX*1.5;\n    const sf = Math.min(scrollY/600, 1);\n    camera.position.z += sf*4;\n    camera.position.y += sf*1.5;\n    camera.lookAt(0, 0.12, 0);\n\n    // remove orbiting glow — violet light now sits softly on the sails (static)\n\n    renderer.render(scene, camera);\n  }\n  animate();\n})();\n\n/* ═══════════════════════════════════════════════\n   SCROLL REVEAL\n   ═══════════════════════════════════════════════ */\nconst observer = new IntersectionObserver(entries => {\n  entries.forEach(e => {\n    if (e.isIntersecting) {\n      e.target.classList.add('visible');\n      // Animate mastery bars\n      const bar = e.target.querySelector('.m-bar-fill[data-width]');\n      if (bar) setTimeout(() => { bar.style.width = bar.dataset.width + '%'; }, 100);\n    }\n  });\n}, { threshold: 0.12 });\n\ndocument.querySelectorAll('.reveal').forEach(el => {\n  // Set bars to 0 initially\n  const bar = el.querySelector('.m-bar-fill[data-width]');\n  if (bar) bar.style.width = '0%';\n  observer.observe(el);\n});\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
